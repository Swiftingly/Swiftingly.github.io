<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="author" content="Swiftingly">
	<meta name="description" content="Polynomial Solver">
	<meta name="keywords" content="pixel,paint,editor,online,free,sprite">
	
	<link rel="icon" href="./favicon-light.svg" type="image/svg" media="(prefers-color-scheme: light)">
	<link rel="icon" href="./favicon-dark.svg" type="image/svg" media="(prefers-color-scheme: dark)">
	<link rel="stylesheet" href="./style.css">
	<script src="index.js" defer></script>
	
	<title>Poly Solver</title>
</head>
<body>
	<div id="main">
		
		<h1>Points</h1>
		<table id="points">
			<tr>
				<td>X</td>
				<td>Y</td>
				<td></td>
			</tr>
			<tr>
				<td><input type="text" id="xinput" title="X input as an integer, decimal, or fraction"></td>
				<td><input type="text" id="yinput" title="Y input as an integer, decimal, or fraction"></td>
				<td><button id="use">Add</button></td>
			</tr>
		</table>
		<br>
		<label>Simplified Fraction</label><input type="checkbox" id="format"><br>
		<label>Desmos Copy</label><input type="checkbox" id="desmos"><br>
		<br>
		<button id="solve">Solve</button>
		
		<br>
		<p id="poly"></p>
	</div>
</body>
</html>
