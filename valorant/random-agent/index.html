<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="author" content="Swiftingly">
	<meta name="description" content="Valorant Agent Randomizer">
	<meta name="keywords" content="valorant,agent,agent randomizer">
	
	<link rel="icon" href="/valorant/favicon.png" type="image/png">
	
	<link rel="stylesheet" type="text/css" href="style.css">
	
	<script src="index.js" defer></script>
	
	<title>Agent Randomizer</title>
</head>
<body>
	<div>
		<h1>vALORaNT AGENT RaNDOMIZER</h1>
		
		<div id="container">
			<div class="category" id="initiator">
				<h2>INITIATOR</h2>
				<div class="agent-list"></div>
				<hr>
				<button id="random-initiator">Random Initiator</button>
			</div>
			
			<div class="category" id="duelist">
				<h2>DUELIST</h2>
				<div class="agent-list"></div>
				<hr>
				<button id="random-duelist">Random Duelist</button>
			</div>
			
			<div class="category" id="sentinel">
				<h2>SENTINEL</h2>
				<div class="agent-list"></div>
				<hr>
				<button id="random-sentinel">Random Sentinel</button>
			</div>
			
			<div class="category" id="controller">
				<h2>CONTROLLER</h2>
				<div class="agent-list"></div>
				<hr>
				<button id="random-controller">Random Controller</button>
			</div>
		</div>
		
		<hr>
		<div>
			<button id="add-all" class="small-button">Add All Agents</button>
			<button id="random-all-roles">Random All-Roles</button>
			<button id="remove-all" class="small-button">Remove All Agents</button>
		</div>
		<div>
			<p id="output"></output>
		</div>
	</div>
	<div id="reveal-zone" class="hidden"><div id="keep"><h2>KEEP</h2></div><div id="info"><img id="reveal-image" /><h2>NAME</h2></div><div id="remove"><h2>REMOVE</h2></div></div>
</body>
</html>
