<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Fracture</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Fracture</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="ADefault.png"></div>
			<div><p>Default from Top1</p><img src="ADefault_Top1.png"></div>
			<div><p>Default from Top2</p><img src="ADefault_Top2.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Side from Top</p><img src="ASide_Top.png"></div>
			<div><p>Hidden from Top</p><img src="AHidden_Top.png"></div>
			<div><p>Front from Top</p><img src="AFront_Top.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Side from Top</p><img src="ASide_Top.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="BDefault.png"></div>
			<div><p>Default from Mid</p><img src="BDefault_Mid.png"></div>
			<div><p>Default from Ramp</p><img src="BDefault_Ramp.png"></div>
			<div><p>Default from Tower</p><img src="BDefault_Tower.png"></div>
		</div>
	</div>
</body>

</html>
