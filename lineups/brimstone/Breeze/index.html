<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Breeze</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Breeze</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>A1</p><img src="A1.png"></div>
			<div><p>A2</p><img src="A2.png"></div>
			<div><p>A4</p><img src="A4.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>A3</p><img src="A3.png"></div>
			<div><p>A3 from Cave</p><img src="A3_Cave.png"></div>
			<div><p>A3 from Mid1</p><img src="A3_Mid1.png"></div>
			<div><p>A3 from Mid2</p><img src="A3_Mid2.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Default from Main</p><img src="BDefault_Main.png"></div>
			<div><p>Default from Window</p><img src="BDefault_Window.png"></div>
			<div><p>Default from Mid</p><img src="BDefault_Mid.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Side from Spawn</p><img src="BSide_Spawn.png"></div>
			<div><p>Side from Window</p><img src="BSide_Window.png"></div>
		</div>
	</div>
</body>

</html>
