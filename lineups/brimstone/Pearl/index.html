<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Pearl</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Pearl</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="ADefault.png"></div>
			<div><p>Default from Dugout</p><img src="ADefault_Dugout.png"></div>
			<div><p>Default from Mid</p><img src="ADefault_Mid.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Corner from Dugout</p><img src="ACorner_Dugout.png"></div>
			<div><p>Corner from Mid</p><img src="ACorner_Mid.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Default from Close</p><img src="BDefault_Close.png"></div>
			<div><p>Default from Heaven</p><img src="BDefault_Heaven.png"></div>
			<div><p>Default from Mid</p><img src="BDefault_Mid.png"></div>
			<div><p>Default from Spawn</p><img src="BDefault_Spawn.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Open from Heaven</p><img src="BOpen_Heaven.png"></div>
			<div><p>Open from Long</p><img src="BOpen_Long.png"></div>
			<div><p>Open from Spawn</p><img src="BOpen_Spawn.png"></div>
		</div>
	</div>
</body>

</html>
