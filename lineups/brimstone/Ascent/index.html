<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Ascent</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Ascent</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="ADefault.png"></div>
			<div><p>Default from Stairs</p><img src="ADefault_Stairs.png"></div>
			<div><p>Default from Heaven</p><img src="ADefault_Heaven.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Box</p><img src="ABox.png"></div>
			<div><p>Box from Stairs</p><img src="ABox_Stairs.png"></div>
			<div><p>Box from Heaven</p><img src="ABox_Heaven.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Generator</p><img src="AGenerator.png"></div>
			<div><p>Generator Close</p><img src="AGenerator_Close.png"></div>
			<div><p>Generator from Stairs</p><img src="AGenerator_Stairs.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="BDefault.png"></div>
			<div><p>Default from Spawn</p><img src="BDefault_Spawn.png"></div>
			
			<div><p>Default from Boat1</p><img src="BDefault_Boat1.png"></div>
			<div><p>Default from Boat2</p><img src="BDefault_Boat2.png"></div>
			
			<div><p>Default from Left</p><img src="BDefault_Left.png"></div>
			<div><p>Default from Mid</p><img src="BDefault_Mid.png"></div>
			<div><p>Default from Right</p><img src="BDefault_Right.png"></div>
		</div>
	</div>
</body>

</html>
