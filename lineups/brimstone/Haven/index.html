<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Haven</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Haven</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
		<input type="radio" id="C-site" name="site">
		<label for="C-site">C Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>A1 from Long</p><img src="A1_Long.png"></div>
			<div><p>A1 from Heaven</p><img src="A1_Heaven.png"></div>
			<div><p>A1 from Sewer</p><img src="A1_Sewer.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>A2 from Long</p><img src="A2_Long.png"></div>
			<div><p>A2 from Heaven</p><img src="A2_Heaven.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>A3 from Long</p><img src="A3_Long.png"></div>
			<div><p>A3 from Heaven</p><img src="A3_Heaven.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Right from Cubby</p><img src="BRight_Cubby.png"></div>
			<div><p>Mid from Cubby</p><img src="BMid_Cubby.png"></div>
		</div>
	</div>
	
	<div id="C-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="CDefault.png"></div>
			<div><p>Default from Cubby</p><img src="CDefault_Cubby.png"></div>
			<div><p>Default from Close</p><img src="CDefault_Close.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Open</p><img src="COpen.png"></div>
			<div><p>Open from Cubby</p><img src="COpen_Cubby.png"></div>
		</div>
	</div>
</body>

</html>
