<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="Swiftingly">
	
	<title>Brimstone Bind</title>
	
	<link rel="stylesheet" href="style.css">
	<script src="index.js" defer></script>
</head>

<body>
	<h1>Bind</h1>
	<img id="bigimg" class="hidden">
	<div>
		<input type="radio" id="A-site" name="site">
		<label for="A-site">A Site</label>
		
		<input type="radio" id="B-site" name="site">
		<label for="B-site">B Site</label>
		
	</div>
	<div id="A-section" class="hidden">
		<div class="flex">
			<div><p>Default</p><img src="ADefault.png"></div>
			<div><p>Default from Lamps</p><img src="ADefault_Lamps.png"></div>
			<div><p>Default from Shower</p><img src="ADefault_Showers.png"></div>
			<div><p>Default from Heaven</p><img src="ADefault_Heaven.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Box</p><img src="ABox.png"></div>
			<div><p>Box from Lamps</p><img src="ABox_Lamps.png"></div>
			<div><p>Box from Showers</p><img src="ABox_Showers.png"></div>
		</div>
	</div>
	
	<div id="B-section" class="hidden">
		<div class="flex">
			<div><p>Left from Garden</p><img src="BLeft_Garden.png"></div>
			<div><p>Left from Hookah1</p><img src="BLeft_Hookah1.png"></div>
			<div><p>Left from Hookah2</p><img src="BLeft_Hookah2.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Edge from Garden</p><img src="BEdge_Garden.png"></div>
		</div>
		<hr>
		<div class="flex">
			<div><p>Right from Mid</p><img src="BRight_Mid.png"></div>
			<div><p>Right from Hookah</p><img src="BRight_Hookah.png"></div>
		</div>
	</div>
</body>

</html>
