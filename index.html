<!DOCTYPE html>
<html style="font-family:Courier New">

<head>
	<title>Word Search</title>
	<script src="wordsearch.js"></script>
</head>

<body>
	<div align="center">
		<h1>Word Search</h1>
		<textarea rows="12" cols="12" id="grid" placeholder="Full grid.."></textarea>
		<br>
		<canvas id="wordSearch" width="600" height="600"></canvas>
		<br>
		<form onsubmit="return solve();">
			<label>Find word:</label>
			<input id="word" type="text" pattern="[a-zA-Z\?]{2,}"></input>
			<button>Solve</button>
		</form>
		<h2>Words</h2>
		<p id="words"></p>
	</div>
</body>

</html>
